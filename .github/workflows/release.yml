name: release

# Fires on ONE path, funneling into ONE build+publish-with-assets run:
#
#   1. A vX.Y.Z (or vX.Y.Z-pre.N) tag push — the deliberate path. Builds the
#      multi-cli-install Node package, packages the bash installers, and creates
#      a GitHub Release for that tag.
#
#   Manual trigger via GitHub Actions UI (workflow_dispatch) — allows a human
#   or release-engineer to cut a release by providing the tag name as an input.
#
# Releases are not allowed to happen as a side effect of a push to main — a
# manual gate is enforced via `workflow_dispatch` tag input.
#
# The "decide" step centralizes tag resolution + the idempotency gate:
# both paths share every build/package/publish step below (parameterized on
# the decided tag, never on github.ref directly). The gate keys on whether a
# Release for the target tag already exists (queried live via `gh release
# view`), so a re-pushed version or a retried run is a clean no-op — never a
# partial/duplicate re-publish.
#
# Pre-release detection is purely tag-shape based — any tag containing "-"
# (e.g. v0.0.1-pre.1, v0.1.0-rc.1) is marked pre-release.
#
# This workflow does NOT publish to npm — that gate is owned by
# release-engineer and is held until real-project validation.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.0.40)'
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# Serialize release runs so two near-simultaneous tag pushes cannot both
# reach the tag-create / publish steps and collide on the same tag or assets.
# Group by ref: every tag push shares one group and queues. cancel-in-progress
# is FALSE on purpose — a queued run must wait for an in-flight publish to
# finish rather than abort it, so we never leave a half-uploaded release behind.
# The decide-step idempotency gate below then turns the queued run into a
# clean no-op if the release already landed.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    # Expected number of assets on a complete release. Bump this in ONE place if
    # the asset set below changes. Current set (4): multi-cli-install tarball,
    # bash-installers tarball, new-project.sh, install-template.sh. The
    # asset-count postflight at the end of the job asserts against this.
    env:
      EXPECTED_ASSET_COUNT: 4
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history + tags: the auto-notes generator diffs this tag
          # against the previous one. (The decide step checks tag/release
          # existence against origin directly, not this local checkout.)
          fetch-depth: 0

      - name: Decide target tag + whether to release
        id: decide
        env:
          GITHUB_REF: ${{ github.ref }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # 1. Resolve the target tag from whichever path triggered us.
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # Tag-push path: release exactly the pushed tag.
            TAG="${GITHUB_REF#refs/tags/}"
            echo "Tag push detected — target $TAG"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Manual trigger path: use the manually-specified tag.
            TAG="${{ github.event.inputs.tag }}"
            if [[ -z "$TAG" ]]; then
              echo "::error::tag input is required for workflow_dispatch"
              exit 1
            fi
            echo "Manual trigger — target $TAG"
          else
            echo "::error::unknown trigger type: ${{ github.event_name }}"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # 2. Idempotency gate (the authoritative check for BOTH paths):
          #    if a GitHub Release for $TAG is already published, do nothing.
          #    Keyed on the RELEASE, not just the tag, and queried live so it
          #    reflects any run that finished after this run's checkout. This
          #    prevents a partial/duplicate re-publish (no half-uploaded assets,
          #    no duplicate release) on a re-pushed version or a retried run.
          #    Clean skip is chosen over hard-fail because the master path fires
          #    on EVERY push — most carry no bump, so failing loudly would keep
          #    the workflow perpetually red on the normal case. Skip is also
          #    inherently idempotent and still recovers a partial failure (tag
          #    pushed but release never created → release missing → we proceed).
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already published — nothing to do, skipping cleanly."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 3. No release yet. Tag-push path: tag already exists on origin (verified
          #    by the GitHub ref). Manual trigger path: tag was provided by user.
          #    Both cases: verify the tag is on origin before publishing.
          if [[ -z "$(git ls-remote --tags origin "refs/tags/$TAG")" ]]; then
            echo "Tag $TAG absent on origin — must push it before release."
            echo "::warning::Tag $TAG is not on origin; manual release should first run:"
            echo "  git tag $TAG && git push origin $TAG"
            exit 1
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        if: steps.decide.outputs.should_release == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tools/multi-cli-install/package-lock.json

      - name: Install + build multi-cli-install
        if: steps.decide.outputs.should_release == 'true'
        working-directory: tools/multi-cli-install
        run: |
          npm ci
          npm run build

      - name: Package multi-cli-install tarball
        if: steps.decide.outputs.should_release == 'true'
        env:
          TAG: ${{ steps.decide.outputs.tag }}
        run: |
          mkdir -p dist-release
          tar -czf "dist-release/multi-cli-install-${TAG}.tar.gz" \
            --exclude='multi-cli-install/node_modules' \
            --exclude='multi-cli-install/test' \
            --exclude='multi-cli-install/.turbo' \
            -C tools multi-cli-install

      - name: Package bash installers tarball
        if: steps.decide.outputs.should_release == 'true'
        env:
          TAG: ${{ steps.decide.outputs.tag }}
        run: |
          tar -czf "dist-release/bash-installers-${TAG}.tar.gz" \
            -C scripts new-project.sh install-template.sh

      - name: Stage raw installer scripts for direct curl
        if: steps.decide.outputs.should_release == 'true'
        run: |
          cp scripts/new-project.sh dist-release/new-project.sh
          cp scripts/install-template.sh dist-release/install-template.sh

      - name: Create GitHub Release
        if: steps.decide.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          # Explicit tag: on the master-push path github.ref is a branch, so the
          # action cannot infer the tag and must be told the decided one.
          tag_name: ${{ steps.decide.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ contains(steps.decide.outputs.tag, '-') }}
          files: |
            dist-release/multi-cli-install-${{ steps.decide.outputs.tag }}.tar.gz
            dist-release/bash-installers-${{ steps.decide.outputs.tag }}.tar.gz
            dist-release/new-project.sh
            dist-release/install-template.sh

      - name: Verify asset count
        if: steps.decide.outputs.should_release == 'true'
        env:
          TAG: ${{ steps.decide.outputs.tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Asset-count postflight — fail on a PARTIAL publish. Query the release
          # live and assert it carries exactly EXPECTED_ASSET_COUNT assets. If the
          # upload half-completed (e.g. one tarball failed), the release exists but
          # is incomplete; without this check the job would still report green and
          # the idempotency gate would then treat the broken release as "done".
          COUNT=$(gh release view "$TAG" --json assets --jq '.assets | length')
          if [[ "$COUNT" != "$EXPECTED_ASSET_COUNT" ]]; then
            echo "::error::expected $EXPECTED_ASSET_COUNT assets, got $COUNT"
            exit 1
          fi
          echo "Asset count OK — $COUNT assets on $TAG."
