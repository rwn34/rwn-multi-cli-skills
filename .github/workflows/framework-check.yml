name: framework-check

# PR-only, fast companion to `gates`. `gates` already runs the full hook suites,
# SSOT drift, and landed-blob checks; this workflow covers the one check `gates`
# does not: protocol-v4 handoff lint. Keeping it as a separate required check
# means handoff evidence discipline is validated independently and quickly.
#
# Deliberately does NOT run on push-to-main — `gates` handles main validation.

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  framework-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Protocol v4 lint: catches sender-side evidence discipline errors
      # (DONE-without-evidence, HYPOTHESIS + priority/Risk C, file-level claims
      # without Observed-in:) before they reach the dispatch queue.
      - name: Handoff protocol v4 lint
        run: bash .ai/tools/lint-handoff.sh
