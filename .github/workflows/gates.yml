name: gates

# Machine-checkable merge gate for the multi-CLI framework (ADR-0007 P2).
# Replaces the human-eyeballed pre-merge checklist: runs the full SSOT drift
# check, all four per-CLI guard suites, the ADR-0005 git pre-commit backstop
# test, and the installer typecheck + test suite on a clean runner (git + node
# on PATH), so the three local "git/npm not on PATH" env-fails PASS here.
#
# BRANCH PROTECTION (repo setting, not a file): to make this a REQUIRED status
# check, enable branch protection on `main` in GitHub repo Settings > Branches
# > Branch protection rules > Require status checks to pass > select "gates".
# This cannot be committed to the repo; it must be set in the GitHub UI/API.

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        if: github.event_name == 'pull_request'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tools/multi-cli-install/package-lock.json

      # Cheap change-detection so the Node-heavy installer block (install +
      # asset drift + typecheck/tests) only runs when installer-related paths
      # actually changed. The required "gates" status still reports green when
      # these steps are skipped; they are not required as separate contexts.
      - name: Detect installer-related changes
        if: github.event_name == 'pull_request'
        id: installer
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --depth=1 origin "${{ github.base_ref }}"
            changed=$(git diff --name-only "origin/${{ github.base_ref }}" HEAD || true)
          else
            before="${{ github.event.before }}"
            if [[ -z "$before" || "$before" == "0000000000000000000000000000000000000000" ]]; then
              echo "installer_changed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            changed=$(git diff --name-only "$before" HEAD || true)
          fi
          if echo "$changed" | grep -qE '^(tools/multi-cli-install/|scripts/new-project\.sh|scripts/install-template\.sh|\.github/workflows/gates\.yml)$'; then
            echo "installer_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "installer_changed=false" >> "$GITHUB_OUTPUT"
          fi

      # The ONE drift authority is the generator itself: --check regenerates
      # every replica into a temp tree and diffs. On failure it prints the
      # copy-pasteable fix (`bash .ai/tools/sync-replicas.sh`) to stderr.
      - name: SSOT drift check
        if: github.event_name == 'pull_request'
        run: bash .ai/tools/sync-replicas.sh --check

      # Landed-blob check: compares the committed blobs of SSOT sources and
      # replicas, independent of the working tree. Catches the stale-source
      # laundering pattern that working-tree drift checks missed (ADR-0015
      # follow-up, 2026-07-17).
      - name: Landed SSOT blob consistency check
        if: github.event_name == 'pull_request'
        run: bash .ai/tools/check-landed-ssot.sh

      - name: Claude hooks test suite
        if: github.event_name == 'pull_request'
        run: bash .claude/hooks/test_hooks.sh

      - name: Kimi hooks test suite
        if: github.event_name == 'pull_request'
        run: bash .kimi/hooks/test_hooks.sh

      - name: Kiro hooks test suite
        if: github.event_name == 'pull_request'
        run: bash .kiro/hooks/test_hooks.sh

      - name: OpenCode guard test suite
        if: github.event_name == 'pull_request'
        run: node .opencode/plugin/test-guard.mjs

      - name: Git pre-commit backstop test (ADR-0005)
        if: github.event_name == 'pull_request'
        run: bash scripts/git-hooks/test-pre-commit.sh

      - name: Installer dependency install
        if: github.event_name == 'pull_request' && steps.installer.outputs.installer_changed == 'true'
        run: npm ci
        working-directory: tools/multi-cli-install

      - name: Asset drift check (installer payload must match sources)
        # Regenerate the asset tree, then gate on it: manifest parity/coverage,
        # no committed generated assets, and every asset file byte-matching its
        # source. This is the gate that catches the 2026-07-12 defect class
        # (stale asset AGENTS.md + missing .opencode guard layer).
        if: github.event_name == 'pull_request' && steps.installer.outputs.installer_changed == 'true'
        run: |
          npx tsx scripts/sync-assets.ts
          cd "$GITHUB_WORKSPACE" && bash .ai/tools/check-asset-drift.sh
        working-directory: tools/multi-cli-install

      - name: Installer typecheck + tests
        if: github.event_name == 'pull_request' && steps.installer.outputs.installer_changed == 'true'
        run: npx tsc --noEmit && npx vitest run
        working-directory: tools/multi-cli-install

      # The tier table also lives in two HAND-WRITTEN restatements (CLAUDE.md and
      # .claude/agents/orchestrator.md) that paraphrase it rather than replicate it,
      # so the byte-for-byte SSOT drift check above structurally cannot cover them —
      # they silently drifted through PR #54. This asserts the load-bearing tier
      # concepts are present in both, and are still where the SSOT says they are.
      #
      # Placed LAST alongside the version-bump check, for the same reason given
      # below: it is a policy-TEXT check, so a failure here must never skip the
      # substantive suites (hooks / backstop / installer) and mask a real defect.
      # Ordering this early did exactly that on the first push of this branch —
      # one prose failure skipped 13 steps.
      # Self-test FIRST: it is hermetic (temp-dir fixtures, never reads the live
      # tree) and proves the checker still detects each failure mode. Running it
      # before the repo assertion means a non-compliant tree cannot skip it and
      # hide a checker that has quietly stopped biting.
      - name: Tier restatement checker self-test
        if: github.event_name == 'pull_request'
        run: bash .ai/tools/test-check-tier-restatements.sh

      - name: Tier restatement check (CLAUDE.md + orchestrator.md vs SSOT §8)
        if: github.event_name == 'pull_request'
        run: bash .ai/tools/check-tier-restatements.sh

      # ADR-0012: the framework version is assigned at MERGE, not on feature
      # branches, so this is a DETECTIVE check on the resulting main push —
      # comparing the previous main tip (github.event.before) to the new one.
      # It runs LAST, after every substantive test above (drift / hooks /
      # backstop / installer), so a missing bump can never mask a real failure
      # (the old PR-time placement did exactly that). It is NOT run on PRs:
      # feature branches deliberately do not bump. Making this a REQUIRED status
      # check is branch-protection (a repo setting), out of this file's scope.
      - name: Framework version-bump check (detective — main push only)
        if: github.event_name == 'push'
        run: bash scripts/check-version-bump.sh "${{ github.event.before }}"
